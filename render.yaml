# Render Blueprint — deploys Reconcilio as a free WEB SERVICE (not a static site).
# Docs: https://render.com/docs/blueprint-spec
#
# IMPORTANT: Reconcilio is a Node/Express server. It must be a Render "Web
# Service" (type: web), NOT a "Static Site". A static site cannot run OAuth,
# webhooks, or the database — every route would 404.
#
# How to deploy:
#   1. Render Dashboard → New → Blueprint → connect saifaldin14/reconcilio.
#   2. Render reads this file and creates the Web Service automatically.
#   3. Set the secret env vars below in the dashboard (they are sync:false),
#      including DATABASE_URL = your Neon connection string.
#   4. Your permanent URL is https://reconcilio.onrender.com
#      APP_URL auto-resolves from RENDER_EXTERNAL_URL — no manual edit needed.
#   5. Put that URL's callback paths into Shopify + Xero app settings:
#        /auth/shopify/callback   and   /auth/xero/callback
#
# Tokens persist in Postgres via DATABASE_URL (this project uses a free Neon DB),
# so connected accounts survive restarts/redeploys.

services:
  - type: web
    name: reconcilio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets — set these in the Render dashboard (never commit real values).
      # DATABASE_URL is your Neon Postgres connection string.
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      # Optional — only needed to WRITE one-click fixes back to Xero.
      - key: ALLOW_XERO_WRITES
        sync: false
      - key: XERO_BANK_ACCOUNT_CODE
        sync: false
      - key: XERO_SALES_ACCOUNT_CODE
        sync: false
