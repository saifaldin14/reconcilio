<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reconcilio feature media">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E8C73"/>
      <stop offset="1" stop-color="#0B5D52"/>
    </linearGradient>
    <linearGradient id="checkg" x1="92" y1="92" x2="196" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9FBF4"/>
    </linearGradient>
    <filter id="cardshadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#06302B" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="score" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E8C73"/>
      <stop offset="1" stop-color="#0B6F5C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft depth circles (subtle, not a heavy pattern) -->
  <circle cx="1340" cy="170" r="360" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="210" cy="760" r="280" fill="#FFFFFF" opacity="0.04"/>

  <!-- ===== Left column: brand + headline ===== -->
  <!-- Icon badge -->
  <g transform="translate(90,96)">
    <rect width="104" height="104" rx="26" fill="#FFFFFF" opacity="0.10"/>
    <circle cx="40" cy="56" r="30" fill="#F5B700" opacity="0.22"/>
    <circle cx="40" cy="56" r="13" fill="#F5B700"/>
    <path d="M40 56 L60 78 L92 36" fill="none" stroke="url(#checkg)" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="214" y="170" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#FFFFFF">Reconcilio</text>

  <!-- Headline (short, benefit-focused) -->
  <text x="92" y="330" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#FFFFFF">Keep your books</text>
  <text x="92" y="412" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#FFFFFF">accurate.</text>

  <text x="92" y="486" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="500" fill="#D7F5EC">Shopify → Xero, audited automatically.</text>

  <!-- Three small benefit chips (minimal text) -->
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#0B5D52">
    <g transform="translate(92,560)">
      <rect width="300" height="58" rx="29" fill="#FFFFFF" opacity="0.92"/>
      <circle cx="34" cy="29" r="9" fill="#0E8C73"/>
      <text x="58" y="37">Missing payouts</text>
    </g>
    <g transform="translate(92,636)">
      <rect width="340" height="58" rx="29" fill="#FFFFFF" opacity="0.92"/>
      <circle cx="34" cy="29" r="9" fill="#d68910"/>
      <text x="58" y="37">Unbooked fees &amp; FX</text>
    </g>
    <g transform="translate(92,712)">
      <rect width="300" height="58" rx="29" fill="#FFFFFF" opacity="0.92"/>
      <circle cx="34" cy="29" r="9" fill="#c0392b"/>
      <text x="58" y="37">Duplicate entries</text>
    </g>
  </g>

  <!-- ===== Right column: app dashboard card ===== -->
  <g transform="translate(840,150)" filter="url(#cardshadow)">
    <rect width="660" height="600" rx="22" fill="#FFFFFF"/>

    <!-- Card header -->
    <text x="40" y="74" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="30" font-weight="700" fill="#202223">Books Health Report</text>

    <!-- Score pill -->
    <g transform="translate(40,104)">
      <rect width="180" height="120" rx="16" fill="url(#score)"/>
      <text x="90" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
            font-size="48" font-weight="800" fill="#FFFFFF">92</text>
      <text x="90" y="96" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif"
            font-size="20" font-weight="600" fill="#D7F5EC">Health score</text>
    </g>

    <!-- Summary counters -->
    <g transform="translate(248,104)" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      <g>
        <rect width="372" height="56" rx="12" fill="#FBFCFD" stroke="#E1E3E5"/>
        <circle cx="28" cy="28" r="8" fill="#c0392b"/>
        <text x="48" y="35" font-size="20" font-weight="600" fill="#202223">2 high priority</text>
      </g>
      <g transform="translate(0,64)">
        <rect width="372" height="56" rx="12" fill="#FBFCFD" stroke="#E1E3E5"/>
        <circle cx="28" cy="28" r="8" fill="#d68910"/>
        <text x="48" y="35" font-size="20" font-weight="600" fill="#202223">1 to review</text>
      </g>
    </g>

    <!-- Issue rows -->
    <g transform="translate(40,256)" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
      <!-- Row 1 -->
      <g>
        <rect width="580" height="92" rx="14" fill="#FBFCFD" stroke="#E1E3E5"/>
        <rect x="0" y="0" width="6" height="92" rx="3" fill="#c0392b"/>
        <text x="28" y="40" font-size="22" font-weight="700" fill="#202223">Shopify payout missing in Xero</text>
        <text x="28" y="70" font-size="18" fill="#6d7175">Payout P2 · 485 GBP</text>
        <g transform="translate(440,26)">
          <rect width="116" height="40" rx="20" fill="#0E8C73"/>
          <text x="58" y="26" text-anchor="middle" font-size="18" font-weight="600" fill="#FFFFFF">Fix this</text>
        </g>
      </g>
      <!-- Row 2 -->
      <g transform="translate(0,108)">
        <rect width="580" height="92" rx="14" fill="#FBFCFD" stroke="#E1E3E5"/>
        <rect x="0" y="0" width="6" height="92" rx="3" fill="#c0392b"/>
        <text x="28" y="40" font-size="22" font-weight="700" fill="#202223">Processor fees not recorded</text>
        <text x="28" y="70" font-size="18" fill="#6d7175">Payout P3 · 24 GBP</text>
        <g transform="translate(440,26)">
          <rect width="116" height="40" rx="20" fill="#0E8C73"/>
          <text x="58" y="26" text-anchor="middle" font-size="18" font-weight="600" fill="#FFFFFF">Fix this</text>
        </g>
      </g>
      <!-- Row 3 -->
      <g transform="translate(0,216)">
        <rect width="580" height="92" rx="14" fill="#FBFCFD" stroke="#E1E3E5"/>
        <rect x="0" y="0" width="6" height="92" rx="3" fill="#d68910"/>
        <text x="28" y="40" font-size="22" font-weight="700" fill="#202223">Multi-currency not converted</text>
        <text x="28" y="70" font-size="18" fill="#6d7175">Payout P4 · USD → GBP</text>
        <g transform="translate(440,26)">
          <rect width="116" height="40" rx="20" fill="#0E8C73"/>
          <text x="58" y="26" text-anchor="middle" font-size="18" font-weight="600" fill="#FFFFFF">Fix this</text>
        </g>
      </g>
    </g>
  </g>
</svg>
