<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reconcilio app icon">
  <title>Reconcilio</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E8C73"/>
      <stop offset="1" stop-color="#0B5D52"/>
    </linearGradient>
    <linearGradient id="check" x1="360" y1="430" x2="840" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9FBF4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#063A33" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full-bleed background (Shopify applies its own rounded mask) -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Verification seal -->
  <circle cx="600" cy="600" r="372" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="600" cy="600" r="372" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Ledger lines (the "books"), staggered like line items -->
  <g fill="#FFFFFF" opacity="0.10">
    <rect x="470" y="486" width="300" height="26" rx="13"/>
    <rect x="470" y="566" width="220" height="26" rx="13"/>
    <rect x="470" y="646" width="270" height="26" rx="13"/>
  </g>

  <!-- The caught discrepancy: amber spotlight at the check's origin -->
  <circle cx="404" cy="612" r="92" fill="#F5B700" opacity="0.22"/>
  <circle cx="404" cy="612" r="40" fill="#F5B700"/>

  <!-- Confident checkmark: books verified -->
  <path d="M404 612 L548 770 L832 446"
        fill="none" stroke="url(#check)" stroke-width="116"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
</svg>
